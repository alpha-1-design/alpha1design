name: Android Build (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > secret_base64.txt
          tr -d '\n\r ' < secret_base64.txt | base64 -d > alpha1design.jks
          rm secret_base64.txt

      - name: Build APK
        run: |
          python3 -c "
          import subprocess, os, pty, select

          java_home = os.environ.get('JAVA_HOME', '')
          cmd = ['bubblewrap', 'build', '--config', 'twa-cli.json', '--keystore', 'alpha1design.jks', '--keypass', os.environ.get('ANDROID_KEYSTORE_PASSWORD', ''), '--storepass', os.environ.get('ANDROID_KEYSTORE_PASSWORD', '')]

          # Use pty.spawn to fool bubblewrap into thinking it has a real terminal
          pid = pty.fork()
          if pid == 0:
              import sys
              subprocess.run(cmd)
              sys.exit(0)

          import termios
          import tty

          # This is a simplified automation loop using the PTY
          # We will send the responses and wait for the process to exit
          def send_input(text):
              # In a real pty we would read the buffer, but for this we'll send a sequence
              pass

          # Since we are in a GitHub Action, the most reliable way to handle
          # these specific prompts without 'expect' is to use a combined input stream
          # but Bubblewrap ignores simple pipes.
          # Let's fall back to a simpler python subprocess with a combined input
          "
          # Actually, the most reliable way without 'expect' is using a python script that
          # uses subprocess.Popen and writes to stdin.
          python3 -c "
          import subprocess, os
          java_home = os.environ.get('JAVA_HOME', '')
          p = subprocess.Popen(['bubblewrap', 'build', '--config', 'twa-cli.json', '--keystore', 'alpha1design.jks', '--keypass', os.environ.get('ANDROID_KEYSTORE_PASSWORD', ''), '--storepass', os.environ.get('ANDROID_KEYSTORE_PASSWORD', '')],
                               stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)

          responses = ['No\n', java_home + '\n', 'Yes\n', 'Yes\n', 'Yes\n', 'Yes\n']
          res_idx = 0

          while True:
              line = p.stdout.readline()
              if not line: break
              print(line, end='')
              if 'install the JDK' in line and res_idx < len(responses):
                  p.stdin.write(responses[res_idx])
                  p.stdin.flush()
                  res_idx += 1
              elif 'Path to your existing JDK' in line and res_idx < len(responses):
                  p.stdin.write(responses[res_idx])
                  p.stdin.flush()
                  res_idx += 1
              elif 'install the Android SDK' in line and res_idx < len(responses):
                  p.stdin.write(responses[res_idx])
                  p.stdin.flush()
                  res_idx += 1
              elif ('terms' in line or 'agree' in line or 'license' in line) and res_idx < len(responses):
                  p.stdin.write(responses[res_idx])
                  p.stdin.flush()
                  res_idx += 1

          p.wait()
          if p.returncode != 0:
              exit(p.returncode)
          "

      - name: Debug File System
        if: always()
        run: |
          echo "Listing all files to find the APK..."
          find . -name "*.apk"
          ls -R

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alpha1design-apk
          path: "**/*.apk"
