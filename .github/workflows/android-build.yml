name: Android Build (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > secret_base64.txt
          tr -d '\n\r ' < secret_base64.txt | base64 -d > alpha1design.jks
          rm secret_base64.txt

      - name: Build APK
        run: |
          sudo apt-get update && sudo apt-get install -y expect

          cat << 'EOF' > build_apk.exp
          #!/usr/bin/expect -f
          set timeout -1
          set keypass [lindex $argv 0]
          set storepass [lindex $argv 1]
          set java_home [lindex $argv 2]

          spawn bubblewrap build --config twa-cli.json --keystore alpha1design.jks --keypass "$keypass" --storepass "$storepass"

          expect "Do you want Bubblewrap to install the JDK"
          send "No\r"

          expect "Path to your existing JDK 17"
          send "$java_home\r"

          expect "Do you want Bubblewrap to install the Android SDK"
          send "Yes\r"

          # Loop to handle all license and installation prompts
          expect {
            "agree to the Android SDK terms" { send "Yes\r"; exp_continue }
            "Accept" { send "Yes\r"; exp_continue }
            "Do you want to install" { send "Yes\r"; exp_continue }
            "agree" { send "Yes\r"; exp_continue }
            "license" { send "Yes\r"; exp_continue }
            eof
          }
          EOF

          chmod +x build_apk.exp
          ./build_apk.exp "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" "$JAVA_HOME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alpha1design-apk
          path: "**/*.apk"
