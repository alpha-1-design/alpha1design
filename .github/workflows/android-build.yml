name: Android Build (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > secret_base64.txt
          tr -d '\n\r ' < secret_base64.txt | base64 -d > alpha1design.jks
          rm secret_base64.txt

      - name: Build APK
        run: |
          # Use a temporary file to feed "No" to Bubblewrap's mandatory JDK check
          echo "No" > jdk_answer.txt
          bubblewrap build --config twa-cli.json --keystore alpha1design.jks --keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" --storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" < jdk_answer.txt
          rm jdk_answer.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alpha1design-apk
          path: "**/*.apk"
