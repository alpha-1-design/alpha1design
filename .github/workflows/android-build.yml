name: Android Build (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > secret_base64.txt
          tr -d '\n\r ' < secret_base64.txt | base64 -d > alpha1design.jks
          rm secret_base64.txt

      - name: Initialize Bubblewrap
        run: |
          # Bubblewrap init is too interactive for standard piping.
          # We use 'yes' to provide the same answer repeatedly, but here we need different answers.
          # The most reliable way for Bubblewrap is often just to use the existing config without 'init' if possible,
          # but 'init' is required to generate the project.
          # Let's try using a more aggressive expect-like approach with a simple python script.
          python3 -c "
          import subprocess
          p = subprocess.Popen(['bubblewrap', 'init', '--config', 'twa-cli.json', '--app-id', 'com.alpha1design.studio'],
                               stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
          p.stdin.write('No\n')
          p.stdin.flush()
          # Wait a bit for the JDK prompt
          p.stdin.write('''' + subprocess.os.environ.get('JAVA_HOME', '') + '\n'')
          p.stdin.flush()
          p.stdin.close()
          stdout, stderr = p.communicate()
          print(stdout)
          print(stderr)
          if p.returncode != 0:
              exit(p.returncode)
          "

      - name: Build APK
        run: |
          # Using the secret password for signing
          bubblewrap build --keystore alpha1design.jks --keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" --storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alpha1design-apk
          path: "**/*.apk"
